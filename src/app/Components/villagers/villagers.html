<main class="main">
  <div class="content">
    <div class="content__inner">
      <div class="content__villagers">
        <h1 class="content__subtitle">Residentes</h1>
        <div>
        <div>
            <h2>Busca uno:</h2>
            <input type="text" [(ngModel)]="searchTerm" placeholder="Buscar por nombre...">
        </div>

        <p *ngIf="isLoading">Cargando residentes...</p>
        <p *ngIf="errorMessage">{{ errorMessage }}</p>
         <table>
            <tr>
                <th (click)="sortVillagers('name')">Nombre</th>
                <th (click)="sortVillagers('species')">Especie</th>
                <th (click)="sortVillagers('personality')">Personalidad</th>
                <th (click)="sortVillagers('gender')">Genero</th>
            </tr>
            <tr *ngFor="let villager of filteredVillagers">
                <td>{{ villager.name }}</td>
                <td>{{ villager.species }}</td>
                <td>{{ villager.personality }}</td>
                <td>{{ villager.gender }}</td>
            </tr>
        </table>
        </div>
      </div>
    </div>
  </div>
</main>
